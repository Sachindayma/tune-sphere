<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tune-Sphere : Music For Everyone..🎶</title>
    <link rel="stylesheet" href="css/TuneSphere.css">
    <link rel="stylesheet" href="css/utility.css">
    <link rel="shortcut icon" href="favicon/favicon.ico" type="image/x-icon">
</head>

<body>

    <div class="container flex bg-black">


        <!-- Left Shift................ -->


        <div class="left ">

            <div class="close">

                <img width="30px" class="invert" src="img/close.svg" alt="">

            </div>

            <div class="home bg-grey rounder m-1 p-1">
                <div class="logo">
                    <img src="https://yt3.googleusercontent.com/2ob7oMfk5l4MUCFLur9zLFHxoN8OMmyD3xh9ouGIgA-DNSITRs3ZqxQTpXYT-LNIF5pwXz-tUA=s900-c-k-c0x00ffffff-no-rj"
                        alt="diseño de logotipo de letra nss con forma de polígono. Diseño de ..." class=" nofocus"
                        tabindex="0" aria-label="diseño de logotipo de letra nss con forma de polígono. Diseño de ..."
                        role="button" data-bm="256" id=" logo" height="150px" width="150px">
                </div>
                <ul>
                    <li><img class="invert" src="img/home.svg" alt="Home">Home</li>
                    <li><img class="invert" src="img/search.svg" alt="search">Search</li>
                </ul>
            </div>

            <!--  Library............ -->

            <div class="library bg-grey  rounded m-1 p-1">
                <div class="heading ">
                    <img class="invert" src="img/library.svg" alt="">
                    <h2>
                        Library
                    </h2>

                </div>

                <div class="songlist">
                    <ul>

                    </ul>
                </div>

            </div>
        </div>



        <!-- RIGHT SHIFT........... -->


        <div class="right bg-grey rounder">
            <div class="header">

                <div class="nav">

                    <div class="hamburgerContainer">

                        <img class="hamburger" src="img/hamburger.svg" alt="">

                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
                            color="#000000" fill="none">
                            <path d="M11.5 18C11.5 18 5.50001 13.5811 5.5 12C5.49999 10.4188 11.5 6 11.5 6"
                                stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                            <path d="M18.5 18C18.5 18 12.5 13.5811 12.5 12C12.5 10.4188 18.5 6 18.5 6" stroke="#ffffff"
                                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>

                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
                            color="#000000" fill="none">
                            <path d="M12.5 18C12.5 18 18.5 13.5811 18.5 12C18.5 10.4188 12.5 6 12.5 6" stroke="#ffffff"
                                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                            <path d="M5.50005 18C5.50005 18 11.5 13.5811 11.5 12C11.5 10.4188 5.5 6 5.5 6"
                                stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>

                    </div>
                </div>
                <div class="buttons">

                    <button class="signupbtn">Sign-up</button>
                    <button class="loginbtn">Log-In</button>

                </div>
            </div>

            <div class="playlist">
                <h1>Tune-Sphere Playlist</h1>

                <div>
                    <h2 id="reco">Recommended For You</h2>
                </div>
                <div class="cardContainer">
                    

                </div>

                <div class="playbar">
                    <div class="seekbar">
                        <div class="circle">

                        </div>
                    </div>


                    <div class="abovebar">

                         <div class="songinfo">

                            </div>

                        <div class="songbutton">

                            <img width="35" id="previous" src="img/previous.svg" alt>
                            <img width="35" id="play" src="img/play.svg" alt>
                            <img width="35" id="next" src="img/next.svg" alt>
 
                            
                            </div>

                            <div class="songtime">

                            </div>

                            <div class="timevol">
                                <div class="volume">
                                    <img width="25px" style="color: white;" src="img/volume.svg" alt="">
                                    <div class="range">
                                        <input type="range" name="Volume">
                                    </div>
                                </div>

                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="created">
        <h2>Created-By : MR. SACHIN DAYMA</h2>
    </div>

</body>
<script src="js/TuneSphere.js"></script>

</html>
